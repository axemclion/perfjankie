name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      couchdb:
        image: couchdb:3
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password
        ports:
          - 5984:5984
        options: >-
          --health-cmd "curl -sf http://admin:password@localhost:5984/"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install --ignore-scripts
      - name: Wait for CouchDB
        run: |
          until curl -sf http://admin:password@localhost:5984/_up; do sleep 2; done
      - name: Set up CouchDB admin
        run: |
          curl -sf -X PUT http://localhost:5984/_node/nonode@nohost/_config/admins/admin \
            -d '"password"' || true
      - name: Configure single-node cluster
        run: |
          # CouchDB 3.x defaults [cluster] n=3 server-side regardless of what
          # the client requests on db creation, which a single-node service
          # container can never satisfy ("Request to create N=3 DB but only
          # 1 node(s)"). Drop it to 1 to match this CI container.
          curl -sf -X PUT http://admin:password@localhost:5984/_node/nonode@nohost/_config/cluster/n \
            -d '"1"'
      - run: npm test
        env:
          COUCHDB_URL: http://admin:password@localhost:5984
